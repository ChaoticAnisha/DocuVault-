server {
    listen 80;

    root /usr/share/nginx/html;
    index index.html;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml;

    # Aggressive cache for hashed static assets (Vite adds content hashes)
    location ~* \.(js|css|woff2?|ttf|eot|ico|png|jpg|jpeg|gif|svg|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # SPA fallback — send all unmatched routes to index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Block hidden files and directories
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
}
