version: '3.9'

# ── Networks ──────────────────────────────────────────────────────────────────
# docuvault-internal: isolated network for data services (postgres, redis).
#   Backend can reach them; NOT reachable from host or nginx directly.
# docuvault-app: application-tier network (nginx, backend, frontend).
networks:
  docuvault-internal:
    driver: bridge
    internal: true
  docuvault-app:
    driver: bridge

# ── Named volumes ─────────────────────────────────────────────────────────────
volumes:
  postgres_data:
  redis_data:

services:
  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: docuvault_postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    # No port exposed to host — internal network only
    networks:
      - docuvault-internal
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    restart: unless-stopped

  # ── Redis ───────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: docuvault_redis
    command: redis-server --requirepass ${REDIS_PASSWORD} --appendonly yes
    environment:
      - REDIS_PASSWORD=${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    # No port exposed to host — internal network only
    networks:
      - docuvault-internal
    healthcheck:
      test: ['CMD-SHELL', 'redis-cli -a $$REDIS_PASSWORD ping | grep -q PONG']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  # ── Backend ─────────────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: docuvault_backend
    env_file: .env
    ports:
      - '5000:5000'
    volumes:
      - ./uploads:/app/uploads
      - ./logs:/app/logs
    networks:
      - docuvault-internal   # reach postgres + redis
      - docuvault-app        # reachable by nginx
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  # ── Frontend (static files served by its own nginx; no host port) ───────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: docuvault_frontend
    networks:
      - docuvault-app
    restart: unless-stopped

  # ── Nginx (reverse proxy + SSL termination) ─────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: docuvault_nginx
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      # Uncomment to mount real SSL certificates for production:
      # - ./nginx/ssl:/etc/nginx/ssl:ro
    networks:
      - docuvault-app
    depends_on:
      - backend
      - frontend
    restart: unless-stopped
